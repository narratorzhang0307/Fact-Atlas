server {
    listen 80;
    listen [::]:80;
    server_name fact-atlas.throughtheglass.art fact_atlas.throughtheglass.art;
    return 301 https://fact-atlas.throughtheglass.art$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fact-atlas.throughtheglass.art;

    ssl_certificate /etc/letsencrypt/live/fact-atlas.throughtheglass.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fact-atlas.throughtheglass.art/privkey.pem;

    client_max_body_size 8m;

    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        proxy_pass http://127.0.0.1:3013;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 190s;
        proxy_send_timeout 190s;
    }
}
